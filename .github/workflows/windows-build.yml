name: Windows Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "Windows/**"
      - "Sources/goldPriceBar/Resources/FloatingCharacter/**"
      - "scripts/build-windows.ps1"
      - ".github/workflows/windows-build.yml"
    tags:
      - "v*"
  pull_request:
    paths:
      - "Windows/**"
      - "Sources/goldPriceBar/Resources/FloatingCharacter/**"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test and publish portable build
        shell: pwsh
        run: ./scripts/build-windows.ps1
      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GoldPriceBar-Windows-x64-1.0.2
          path: dist/GoldPriceBar-Windows-x64-1.0.2.zip
          if-no-files-found: error
